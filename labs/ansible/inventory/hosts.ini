# ============================================================
# Ansible Inventory — hosts.ini
#
# An inventory file tells Ansible:
#   - Which servers exist
#   - How to reach them (IP, user, key)
#   - How to group them
#
# INI format (there is also YAML format — same idea).
# ============================================================

# ── Group: [servers] ───────────────────────────────────────
# Both managed nodes belong to the "servers" group.
# You can target this group in playbooks with:   hosts: servers
# Or target a single host with:                  hosts: server1
[servers]
server1  ansible_host=10.20.0.11
server2  ansible_host=10.20.0.12


# ── Group variables ────────────────────────────────────────
# Variables that apply to EVERY host in [servers].
[servers:vars]

# SSH user to log in as
ansible_user=root

# Private key file (generated at container startup)
ansible_ssh_private_key_file=/root/.ssh/id_rsa

# Extra SSH options (suppress host key prompts)
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

# Python interpreter path on the managed nodes
ansible_python_interpreter=/usr/bin/python3
