# ============================================================
# Ansible Lab — Control Node + 2 Managed Servers
#
# Topology:
#   control  (10.20.0.10)  — Ansible Control Node (you run playbooks here)
#   server1  (10.20.0.11)  — Managed Node 1  (Ubuntu with SSH)
#   server2  (10.20.0.12)  — Managed Node 2  (Ubuntu with SSH)
#
# Usage:
#   docker compose build
#   docker compose up -d
#   docker exec -it ansible-control bash
# ============================================================

services:
  # ──────────────────────────────────────────────────────────
  # CONTROL NODE
  # This is where you run ansible-playbook commands.
  # Ansible is installed here; it SSHs into the servers.
  # ──────────────────────────────────────────────────────────
  control:
    build:
      context: .
      dockerfile: Dockerfile.control
    container_name: ansible-control
    hostname: ansible-control

    networks:
      ansible-net:
        ipv4_address: 10.20.0.10

    volumes:
      # Shared volume: control generates SSH keys here,
      # servers read the public key from here.
      - ansible-keys:/ansible-keys
      # Mount playbooks so you can edit them from VS Code
      # on your Windows host and run them inside the container.
      - ./playbooks:/playbooks
      # Mount inventory so you can edit it from the host too.
      - ./inventory:/inventory

    environment:
      - ANSIBLE_HOST_KEY_CHECKING=False

    # Keep the container alive; users run:
    #   docker exec -it ansible-control bash
    command: ["tail", "-f", "/dev/null"]

    depends_on:
      - server1
      - server2

  # ──────────────────────────────────────────────────────────
  # MANAGED NODE 1
  # A plain Ubuntu server with SSH.  Ansible manages this.
  # ──────────────────────────────────────────────────────────
  server1:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ansible-server1
    hostname: server1

    networks:
      ansible-net:
        ipv4_address: 10.20.0.11

    volumes:
      # Read-only: server picks up the public key generated by control
      - ansible-keys:/ansible-keys:ro

  # ──────────────────────────────────────────────────────────
  # MANAGED NODE 2
  # ──────────────────────────────────────────────────────────
  server2:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ansible-server2
    hostname: server2

    networks:
      ansible-net:
        ipv4_address: 10.20.0.12

    volumes:
      - ansible-keys:/ansible-keys:ro

# ──────────────────────────────────────────────────────────
# NETWORK
# Isolated bridge network with fixed IPs so the inventory
# file always matches the actual container addresses.
# ──────────────────────────────────────────────────────────
networks:
  ansible-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/24

# ──────────────────────────────────────────────────────────
# VOLUMES
# ansible-keys: shared between control (read/write) and
#               servers (read-only).  Lives inside Docker,
#               not on your host filesystem.
# ──────────────────────────────────────────────────────────
volumes:
  ansible-keys:
