---
# ============================================================
# roles/webserver/tasks/main.yml
#
# Install nginx and deploy a custom site using Jinja2 templates.
# ============================================================

- name: "[webserver] Install nginx"
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

- name: "[webserver] Ensure web root exists"
  ansible.builtin.file:
    path: "{{ web_root }}"
    state: directory
    mode: '0755'

- name: "[webserver] Deploy nginx site config from template"
  ansible.builtin.template:
    src: nginx.conf.j2        # → roles/webserver/templates/nginx.conf.j2
    dest: /etc/nginx/sites-available/ansible-lab
    mode: '0644'
  notify: Reload nginx         # trigger handler only if file changed

- name: "[webserver] Enable the site"
  ansible.builtin.file:
    src: /etc/nginx/sites-available/ansible-lab
    dest: /etc/nginx/sites-enabled/ansible-lab
    state: link
  notify: Reload nginx

- name: "[webserver] Remove default nginx site"
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: "[webserver] Deploy index.html from template"
  ansible.builtin.template:
    src: index.html.j2        # → roles/webserver/templates/index.html.j2
    dest: "{{ web_root }}/index.html"
    mode: '0644'

- name: "[webserver] Ensure nginx is started and enabled"
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
