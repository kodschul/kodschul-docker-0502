    #       server {
    #           listen 443 ssl;
    #           server_name {{ inventory_hostname }};
    #           ssl_certificate     {{ ssl_dir }}/server.crt;
    #           ssl_certificate_key {{ ssl_dir }}/server.key;
    #           root /var/www/html;
    #           index index.html;
    #       }
    #   notify: Reload nginx
    #
