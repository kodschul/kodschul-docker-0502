# ============================================================
# ansible.cfg — Ansible configuration for the lab
#
# This file is copied into /etc/ansible/ansible.cfg inside
# the control container.
#
# Ansible reads settings in this order:
#   1. Environment variables (ANSIBLE_*)
#   2. ~/.ansible.cfg
#   3. /etc/ansible/ansible.cfg   ← this file
# ============================================================

[defaults]

# ------------------------------------------------------------------
# Inventory: the file listing which servers Ansible manages.
# We mount ./inventory into /inventory in docker-compose.yml.
# ------------------------------------------------------------------
inventory = /inventory/hosts.ini

# ------------------------------------------------------------------
# host_key_checking = False
# Skips the "Are you sure you trust this host?" SSH prompt.
# Fine for a lab; always enable in production.
# ------------------------------------------------------------------
host_key_checking = False

# ------------------------------------------------------------------
# SSH user.  Our server containers allow root login by key.
# ------------------------------------------------------------------
remote_user = root

# ------------------------------------------------------------------
# SSH private key generated automatically at startup.
# ------------------------------------------------------------------
private_key_file = /root/.ssh/id_rsa

# ------------------------------------------------------------------
# Suppress the deprecation warning about Python interpreter detection.
# ------------------------------------------------------------------
interpreter_python = auto_silent

# ------------------------------------------------------------------
# How many servers to manage in parallel.
# With only 2 servers, 5 is more than enough.
# ------------------------------------------------------------------
forks = 5

# ------------------------------------------------------------------
# Output format: shows ok/changed/failed per host at the end.
# ------------------------------------------------------------------
stdout_callback = default

[ssh_connection]

# Suppress host key warnings and known_hosts pollution.
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

# Speed up connections by reusing SSH sockets.
pipelining = True
