apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: backend
  labels:
    app: backend
spec:
  selector:
    matchLabels:
      app: backend

  replicas: 5

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: app
          image: backend:latest
          imagePullPolicy: Never
